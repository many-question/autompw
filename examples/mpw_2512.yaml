mpw:
  name: MPW_2512
  size_um: [3333, 2222]
  origin: [0, 0]
  dicing_margin_um: 50

spacing:
  design_to_design_um: 50

calibre:
  executable: calibre
  shell: csh
  setup_script: /edamgr/setup_calibre.csh
  args: "-drc -hier -turbo 8 -turbo_all -hyper connect"
  work_dir: ./build/calibre
  flows:
    metal:
      enabled: true
      deck_template: ../deck/dummy_script_metal
      output_suffix: _DM
      summary_name: DM.sum
    odpo:
      enabled: true
      deck_template: ../deck/dummy_script_ODPO
      output_suffix: _DODPO
      summary_name: DODPO.sum

layers:
  marker: [0, 0]
  dummy_blocker:
    layers:
      - layer: [150, 1]
        grow_um: 1
      - layer: [150, 2]
        grow_um: 1
      - layer: [150, 3]
        grow_um: 1
      - layer: [150, 4]
        grow_um: 1
      - layer: [150, 5]
        grow_um: 1
      - layer: [150, 6]
        grow_um: 1
      - layer: [150, 7]
        grow_um: 1
      - layer: [150, 8]
        grow_um: 1
      - layer: [150, 9]
        grow_um: 3
      - layer: [150, 20]
        grow_um: 1
      - layer: [150, 21]
        grow_um: 1
  edge_fill:
    layers:
      - [5, 0]
      - [162, 2]
    ring_width_um: 0.45

gds:
  topcell: MPW_2512
  dbu_um: 0.001
  flatten_final: false
  preserve_child_cells: true
  allow_cell_rename: true

output:
  build_dir: ./build
  framework_gds: ./build/framework.gds
  final_gds: ./build/mpw_final.gds

designs:
  - name: HSY
    gds: ./input/L0_TOP_HSY.gds
    topcell: L0_TOP_v2
    size_um: [987.320, 987.320]
    coord: [1057.000, 0.000]
    anchor: bottom_left
    replace_with_placeholder: false

  - name: ZSY
    gds: ./input/L0_TOP_HSY.gds
    topcell: L0_TOP_v2
    size_um: [987.320, 987.320]
    coord: [0.000, 0.000]
    anchor: bottom_left
    replace_with_placeholder: true
